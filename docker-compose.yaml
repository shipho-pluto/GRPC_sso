version: '3.8'

services:
  app:
    build: .
    container_name: sso-app
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - ENV=docker
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=url_shortener
      - DB_SSLMODE=disable
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - REDIS_MAX_RETRIES=3
      - REDIS_DIAL_TIMEOUT=10s
      - REDIS_TIMEOUT=5s
      - KAFKA_ADDRESS=kafka:9092
      - KAFKA_TOPIC=topic
      - KAFKA_NETWORK=tcp
      - KAFKA_PARTITIONS=1
      - KAFKA_REPLICATIONS=1
      - KAFKA_GROUP_ID=test-group
      - GRPC_PORT=8081
      - GRPC_TIMEOUT=10h
      - TOKEN_TTL=1h
      - CONFIG_PATH=/app/config/docker.yaml
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - sso-network
    volumes:
      - ./config:/app/config:ro
      - ./migrations:/app/migrations:ro

  postgres:
    image: postgres:16-alpine
    container_name: sso-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=url_shortener
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d url_shortener"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - sso-network

  redis:
    image: redis:7-alpine
    container_name: sso-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - sso-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: sso-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - sso-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: sso-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - sso-network
    volumes:
      - kafka_data:/var/lib/kafka/data

networks:
  sso-network:
    driver: bridge
    name: sso-network

volumes:
  postgres_data:
    name: sso-postgres-data
  redis_data:
    name: sso-redis-data
  kafka_data:
    name: sso-kafka-data